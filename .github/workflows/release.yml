name: Release

on:
  push:
    paths:
      - 'CHANGELOG.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.2)'
        required: true

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(head -20 CHANGELOG.md | grep -oP '^##\s+\K[v0-9.]+')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ -(alpha|beta|rc|pre) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: windows-latest
    needs: get-version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx @electron/rebuild
      - run: npm run plugin
      - run: npm run build -- --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    runs-on: ubuntu-latest
    needs: [get-version, build]
    steps:
      - uses: actions/checkout@v4
      - run: git config user.name "github-actions" && git config user.email "github-actions@github.com"
      - run: git tag -f ${{ needs.get-version.outputs.version }}
      - run: git push origin ${{ needs.get-version.outputs.version }} --force
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          name: ${{ needs.get-version.outputs.version }}
          prerelease: ${{ needs.get-version.outputs.is_prerelease }}
          draft: false
          generate_release_notes: false
          files: |
            dist/*.exe
            dist/*.rbxmx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  discord-notify:
    runs-on: ubuntu-latest
    needs: [get-version, create-release]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - id: changelog
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          VERSION_NO_V="${VERSION#v}"
          python3 << 'EOF'
          import re
          import os
          version = os.environ.get('VERSION_NO_V', '')
          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()
          pattern = rf'^##\s+v?{re.escape(version)}\s*$'
          match = re.search(pattern, content, re.MULTILINE | re.IGNORECASE)
          if match:
              start = match.end()
              next_section = re.search(r'^##\s+', content[start:], re.MULTILINE)
              end = start + next_section.start() if next_section else len(content)
              section = content[start:end].strip()
              lines = [line.strip() for line in section.split('\n') if line.strip() and not line.startswith('#')]
              changelog_text = '\n'.join(lines)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'changelog<<EOF\n{changelog_text}\nEOF\n')
          else:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'changelog<<EOF\nNova versão disponível\nEOF\n')
          EOF
        env:
          VERSION_NO_V: ${{ needs.get-version.outputs.version }}
      - run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            exit 0
          fi
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"@everyone\",
              \"embeds\": [{
                \"author\": {
                  \"name\": \"Jonu | Update Release\",
                  \"icon_url\": \"https://i.ibb.co/pj3qbyHf/aw.png\"
                },
                \"title\": \"Jonuffy Spoofer ${{ needs.get-version.outputs.version }}\",
                \"url\": \"https://github.com/${{ github.repository }}/releases/tag/${{ needs.get-version.outputs.version }}\",
                \"description\": \"${{ steps.changelog.outputs.changelog }}\",
                \"color\": 8133317,
                \"thumbnail\": {
                  \"url\": \"https://i.ibb.co/pj3qbyHf/aw.png\"
                },
                \"image\": {
                  \"url\": \"https://i.ibb.co/pj3qbyHf/aw.png\"
                }
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
